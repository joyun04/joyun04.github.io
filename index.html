<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Access Restricted</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #eaeaea;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      color: #888;
      margin-bottom: 30px;
    }

    .status {
      color: #00ff9c;
      margin-bottom: 20px;
    }

    .btn {
      border: 1px solid #00ff9c;
      padding: 10px 20px;
      color: #00ff9c;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ff9c;
      color: #000;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ACCESS DENIED<span class="blink">_</span></h1>
    <p>This site is currently under construction.</p>

    <div class="status">● STATUS: ACTIVE DEVELOPMENT</div>

    <a href="https://github.com/아이디" class="btn">VIEW GITHUB</a>
  </div>
</body>
</html>
